name: Build and deploy Node.js app to Azure Web App - traffic-monitoring-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Verify route file
        run: |
          echo "Checking route file params type..."
          grep -A 2 "export async function GET" app/api/intersections/\[id\]/route.ts || true

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NODE_ENV: production
          AZURE_COSMOS_ENDPOINT: "https://dummy.documents.azure.com:443/"
          AZURE_COSMOS_KEY: "dummy-key-for-build"
          AZURE_COSMOS_DATABASE: "TrafficDB"
          # Dummy values for build-time (actual values set in Azure)
          AZURE_COSMOS_ENDPOINT: https://dummy.documents.azure.com:443/
          AZURE_COSMOS_KEY: dummy_key_for_build_only
          AZURE_COSMOS_DATABASE: TrafficDB
          AZURE_STORAGE_ACCOUNT_NAME: dummy
          AZURE_STORAGE_ACCOUNT_KEY: dummy_key
          AZURE_STORAGE_CONTAINER_NAME: avatars

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r .next/standalone/* deploy/
          cp -r .next/static deploy/.next/static
          cp -r public deploy/public
          cp web.config deploy/
          cp package.json deploy/
          cp package-lock.json deploy/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AD94D725D26243C89F1964778C2DACE5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_05B6E788989A4FC08338FFCE44D7F1CA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CA54A5CB92EF4C4597DDA6894EABD03E }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'traffic-monitoring-app'
          slot-name: 'Production'
          package: .
