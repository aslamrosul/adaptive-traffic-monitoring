name: Build and deploy Node.js app to Azure Web App - traffic-monitoring-app (DISABLED)

# Disabled - using Docker deployment instead
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          # Copy standalone server files (includes .next directory)
          if [ -d ".next/standalone" ]; then
            cp -r .next/standalone/. deploy/
          fi
          # Copy static files - standalone already has .next, just add static
          if [ -d ".next/static" ]; then
            cp -r .next/static deploy/.next/static
          fi
          # Copy public files
          if [ -d "public" ]; then
            cp -r public deploy/public
          fi
          # Copy startup script
          if [ -f "startup.sh" ]; then
            cp startup.sh deploy/
            chmod +x deploy/startup.sh
          fi
          # List structure for debugging
          echo "=== Deploy directory structure ==="
          ls -la deploy/
          echo "=== .next directory ==="
          ls -la deploy/.next/ || echo "No .next directory"
          echo "=== Static files ==="
          ls -la deploy/.next/static/ || echo "No static directory"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AD94D725D26243C89F1964778C2DACE5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_05B6E788989A4FC08338FFCE44D7F1CA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CA54A5CB92EF4C4597DDA6894EABD03E }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'traffic-monitoring-app'
          package: .
